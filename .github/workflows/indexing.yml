name: 🚀 3-Day Global Indexing

on:
  schedule:
    # Runs every 3 days at 00:00 UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔑 Inject Google Tokens
        run: |
          echo "$GOOGLE_TOKEN_JSON" > google-token.json
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}

      - name: 🚀 Run Indexing Engine
        run: npm run index-now
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}

      - name: 🛡️  Run Indexing Auditor
        run: npm run index-audit
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
